# ===================================================================
# Staging Profile - Environment-specific overrides (Ticket LF-205)
# ===================================================================

# Supabase connection - override with actual staging values
spring.datasource.url=jdbc:postgresql://<STAGING_SUPABASE_HOST>:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.<STAGING_PROJECT_REF>
spring.datasource.password=${SUPABASE_DB_PASSWORD}

# HikariCP - tighter settings for staging
spring.datasource.hikari.maximum-pool-size=8
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=280000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.connection-timeout=15000

# Redis - staging redis
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}
spring.redis.password=${REDIS_PASSWORD:}

# CORS - staging frontend
app.cors.allowed-origins=https://staging.yourapp.com

# JPA - no auto DDL on staging
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
